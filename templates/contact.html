<style>
    .contact-section { padding: 4rem 2rem 2rem; text-align: center; }
    .contact-grid {
        max-width: 700px; margin: 2rem auto 0;
        display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    }
    .contact-card {
        display: flex; align-items: center; gap: 12px;
        background: var(--card);
        border: 1px solid $border;
        border-radius: 14px; padding: 14px 18px;
        color: var(--muted) !important;
        text-decoration: none !important;
        font-size: 13px; font-weight: 600;
        transition: all 0.2s;
    }
    .contact-card:hover {
        border-color: rgba(37,99,235,0.25);
        color: var(--text) !important;
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(37,99,235,0.08);
    }
    .contact-icon {
        width: 36px; height: 36px;
        display: flex; align-items: center; justify-content: center;
        background: rgba(37,99,235,0.08);
        border-radius: 10px; font-size: 16px; flex-shrink: 0;
    }
    .footer {
        text-align: center; padding: 2rem;
        border-top: 1px solid $border;
        font-family: 'Fira Code', monospace;
        font-size: 12px; color: var(--muted); margin-top: 2rem;
    }
    .cv-download-wrap { margin-top: 18px; }
    .cv-download-btn {
        display: inline-flex; align-items: center; justify-content: center; gap: 8px;
        padding: 10px 22px; border-radius: 999px;
        font-size: 13px; font-weight: 700; cursor: pointer;
        border: none; font-family: inherit;
        background: var(--accent); color: #fff;
        box-shadow: 0 4px 16px rgba(37,99,235,0.32);
        transition: all 0.2s;
    }
    .cv-download-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 22px rgba(37,99,235,0.45);
    }
    @media (max-width: 680px) {
        .contact-section { padding: 2.5rem 1.2rem 1.5rem; }
        .contact-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="contact-section">
    <div class="section-eyebrow">Disponible · Sept 2026</div>
    <div class="section-title">Contact</div>
    <div class="contact-grid">
        <a href="mailto:karamanlian.ibrahim@gmail.com" class="contact-card">
            <div class="contact-icon">📧</div>
            karamanlian.ibrahim@gmail.com
        </a>
        <a href="tel:+33646864447" class="contact-card">
            <div class="contact-icon">📱</div>
            06 46 86 44 47
        </a>
    </div>
    <div class="cv-download-wrap">
        <button type="button" class="cv-download-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑ Retour en haut</button>
    </div>
</div>

<div class="footer">
    Ibrahim Karamanlian · 2026 · Efrei Paris · Bac +4 Data &amp; IA
</div>
